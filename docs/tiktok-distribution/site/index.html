<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Anky TikTok Queue</title>
    <meta
      name="description"
      content="A simple queue of TikTok videos for warming the Anky account."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <header>
        <p>Anky TikTok warmup</p>
        <h1>Next videos</h1>
        <div class="status">
          <span id="remaining-count">888 left</span>
          <button id="reset" type="button">reset</button>
        </div>
      </header>

      <ol id="links" aria-live="polite"></ol>
    </main>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
