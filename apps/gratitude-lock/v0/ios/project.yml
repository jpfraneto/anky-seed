name: GratitudeLockByAnky
options:
  bundleIdPrefix: com.anky
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
targets:
  GratitudeLockByAnky:
    type: application
    platform: iOS
    sources:
      - path: GratitudeLockByAnky
    info:
      path: GratitudeLockByAnky/Info.plist
      properties:
        CFBundleDisplayName: GratitudeLockByAnky
        CFBundleIconName: AppIcon
        CFBundleIcons:
          CFBundlePrimaryIcon:
            CFBundleIconName: AppIcon
            CFBundleIconFiles:
              - AppIcon60x60
            UIPrerenderedIcon: false
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: GratitudeLockByAnky uses the microphone only when you choose to speak your gratitude.
        NSCameraUsageDescription: GratitudeLockByAnky uses the camera only when you choose to capture a gratitude image.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anky.GratitudeLockByAnky
        PRODUCT_NAME: GratitudeLockByAnky
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: 1
